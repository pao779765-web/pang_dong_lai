    background-position: center 49%;
    background-repeat: no-repeat;
    background-size: cover;
    filter: saturate(.92) contrast(.97) brightness(1.01);
  }

  .pdl-hero-overlay {
    z-index: 1;
    background:
      radial-gradient(ellipse at 50% 44%, rgba(255, 252, 247, .68) 0%, rgba(255, 248, 240, .48) 29%, rgba(255, 248, 240, .13) 51%, transparent 69%),
      linear-gradient(180deg, rgba(42, 28, 21, .10) 0%, transparent 21%, transparent 73%, rgba(42, 28, 21, .13) 100%);
  }

  .pdl-photo-hero .liquid-glass {
    border: 1px solid rgba(255, 255, 255, .62);
    background: rgba(255, 250, 245, .69);
    background-blend-mode: normal;
    box-shadow: 0 12px 40px rgba(61, 38, 26, .09), inset 0 1px 0 rgba(255, 255, 255, .58);
    -webkit-backdrop-filter: blur(18px) saturate(1.05);
    backdrop-filter: blur(18px) saturate(1.05);
  }

  .pdl-photo-hero .liquid-glass::before {
    display: none;
  }

  .pdl-hero-nav {
    color: #2b1d16;
  }

  .pdl-photo-hero .pdl-nav-shell {
    background: rgba(255, 250, 245, .72);
  }

  .pdl-photo-hero nav a,
  .pdl-photo-hero nav button,
  .pdl-photo-hero nav [class*="text-white"] {
    color: rgba(43, 29, 22, .80);
  }

  .pdl-photo-hero nav a:hover,
  .pdl-photo-hero nav button:hover {
    color: #2b1d16;
  }

  .pdl-photo-hero nav a > span:first-child {
    background: #2b1c15;
    color: #fffaf5;
  }

  .pdl-photo-hero .pdl-mobile-menu {
    background: rgba(255, 250, 245, .92);
  }

  .pdl-photo-hero .pdl-mobile-menu button:hover {
    background: rgba(107, 68, 50, .08);
  }

  .pdl-hero-content {
    min-height: 0;
    padding-block: clamp(1rem, 3.2vh, 2.75rem);
  }

  .pdl-hero-content > div:first-child {
    margin-bottom: clamp(.75rem, 1.8vh, 1.25rem);
    color: rgba(46, 31, 23, .64);
    text-shadow: 0 1px 16px rgba(255, 252, 247, .66);
  }

  .pdl-hero-content h1 {
    max-width: 72rem;
    color: #241914;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: clamp(4rem, 6.2vw, 6rem);
    font-weight: 550;
    line-height: 1.02;
    letter-spacing: -.045em;
    text-shadow: 0 2px 22px rgba(255, 252, 247, .55);
  }

  .pdl-hero-content h1 span {
    color: #6b4432;
    font-family: inherit;
    font-style: normal;
  }

  .pdl-hero-content > p {
    margin-top: clamp(1rem, 2vh, 1.5rem);
    max-width: 43rem;
    color: rgba(47, 35, 29, .76);
    font-size: clamp(.9rem, 1.15vw, 1rem);
    line-height: 1.8;
    text-shadow: 0 1px 14px rgba(255, 252, 247, .72);
  }

  .pdl-hero-form {
    margin-top: clamp(1.25rem, 2.8vh, 2rem);
  }

  .pdl-photo-hero .pdl-question-shell {
    min-height: 62px;
    border-color: rgba(103, 76, 62, .18);
    background: rgba(255, 250, 246, .79);
    box-shadow: 0 16px 42px rgba(58, 38, 28, .13), inset 0 1px 0 rgba(255, 255, 255, .72);
  }

  .pdl-question-shell > svg {
    color: rgba(78, 57, 47, .52);
  }

  .pdl-question-shell input {
    color: #2b1d16;
    caret-color: #6b4432;
  }

  .pdl-question-shell input::placeholder {
    color: rgba(78, 57, 47, .58);
    opacity: 1;
  }

  .pdl-question-shell button[type="submit"] {
    background: #2b1c15;
    color: #fffaf5;
    box-shadow: 0 8px 22px rgba(43, 28, 21, .20);
  }

  .pdl-question-shell button[type="submit"]:hover {
    transform: translateY(-1px) scale(1.02);
    filter: brightness(1.08);
  }

  .pdl-photo-hero .pdl-hero-cta {
    border-color: rgba(102, 74, 59, .20);
    background: rgba(255, 250, 245, .72);
    color: #3b281f;
    box-shadow: 0 10px 28px rgba(61, 38, 26, .08);
  }

  .pdl-photo-hero .pdl-hero-cta:hover {
    transform: translateY(-1px);
    background: rgba(255, 252, 248, .88);
  }

  .pdl-trust-row {
    flex: 0 0 auto;
  }

  .pdl-photo-hero .pdl-trust-pill {
    border-color: rgba(103, 76, 62, .14);
    background: rgba(255, 250, 245, .66);
    color: rgba(55, 40, 32, .76);
    box-shadow: 0 8px 28px rgba(61, 38, 26, .07);
  }

  .pdl-photo-hero :focus-visible {
    outline: 2px solid rgba(107, 68, 50, .78);
    outline-offset: 3px;
  }

  @media (max-height: 820px) and (min-width: 640px) {
    .pdl-hero-nav {
      padding-block: .8rem;
    }

    .pdl-hero-content {
      padding-block: .5rem 1rem;
    }

    .pdl-hero-content h1 {
      font-size: clamp(3.6rem, 6vw, 5.2rem);
    }

    .pdl-hero-form {
      margin-top: 1rem;
    }

    .pdl-trust-row {
      padding-bottom: 1rem;
    }
  }

  @media (max-width: 639px) {
    .pdl-hero-background {
      background-position: center 43%;
